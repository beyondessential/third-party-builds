name: APT Repository

on:
  workflow_dispatch:
    inputs:
      rebuild:
        description: "Full rebuild: snapshot, wipe, and republish the entire repo from source"
        type: boolean
        default: false
  schedule:
    - cron: "0 */3 * * *"
  workflow_run:
    workflows: ["aardvark-dns", "buildah", "caddy", "crun", "kopia", "krun", "libkrun", "libkrunfw", "netavark", "passt", "podman"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      - .github/workflows/apt-repo.yml
      - scripts/**
  pull_request:
    paths:
      - .github/workflows/apt-repo.yml
      - scripts/**

permissions:
  id-token: write
  contents: read

concurrency:
  group: apt-repo
  cancel-in-progress: false

jobs:
  helper-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deb tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev binutils zstd xz-utils
      - name: repack-to-xz helper
        run: bash scripts/test/repack-to-xz.test.sh
      - name: select-new-debs helper
        run: bash scripts/test/select-new-debs.test.sh

  # PR-only: exercise the REAL publish path (repack + deb-s3 upload + the
  # snapshot S3->S3 copy form) against a mock S3 (LocalStack), so gem-version,
  # aws/deb-s3 param, and flow/manifest breakage is caught on the PR instead of
  # during a live cutover. The production upload role is not assumable from a
  # pull_request OIDC context, so this uses LocalStack rather than real S3;
  # real-IAM actions are therefore not covered here (the known ones are fixed,
  # and the post-merge Debian smoke tests exercise real installs).
  test-publish-integration:
    needs: helper-tests
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    services:
      s3:
        image: localstack/localstack:3
        ports:
          - 4566:4566
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ap-southeast-2
      ENDPOINT: http://localhost:4566
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev binutils gnupg ruby ruby-dev build-essential zstd xz-utils
          sudo gem install deb-s3 -v 26.1.0
          deb-s3 --version
          aws --version
      - name: Wait for LocalStack S3
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$ENDPOINT/_localstack/health" >/dev/null 2>&1; then echo ready; exit 0; fi
            sleep 2
          done
          echo "LocalStack did not become ready"; exit 1
      - name: Publish path against mock S3
        run: |
          set -euo pipefail
          chmod +x scripts/repack-to-xz.sh
          AWS="aws --endpoint-url=$ENDPOINT"
          $AWS s3 mb s3://bes-ops-tools

          # Ephemeral signing key (no dependency on the production GPG secret).
          export GNUPGHOME="$(mktemp -d)"
          gpg --batch --pinentry-mode loopback --passphrase '' \
            --quick-generate-key "apt-ci <ci@bes.local>" default default never
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')

          mkfixture() {  # <version> <out.deb> : build a synthetic zstd .deb
            local d; d="$(mktemp -d)/p"; mkdir -p "$d/DEBIAN" "$d/usr/bin"
            printf 'Package: apt-ci-fixture\nVersion: %s\nArchitecture: amd64\nMaintainer: ci <ci@bes.local>\nDescription: ci fixture\n' "$1" > "$d/DEBIAN/control"
            printf '#!/bin/sh\ntrue\n' > "$d/usr/bin/apt-ci-fixture"; chmod 755 "$d/usr/bin/apt-ci-fixture"
            dpkg-deb --root-owner-group -Z zstd -b "$d" "$2"
          }
          publish() {  # <deb> : the production deb-s3 invocation, against the mock endpoint
            deb-s3 upload \
              --bucket bes-ops-tools --prefix apt \
              --endpoint "$ENDPOINT" --force-path-style \
              --s3-region ap-southeast-2 \
              --codename stable --suite stable --component main --origin "BES Tools" \
              --arch amd64 --preserve-versions --visibility nil \
              --sign="$KEYID" --gpg-options="--pinentry-mode loopback --batch --yes --no-tty" \
              "$1"
          }

          mkdir -p staged
          # 1) repack zstd -> xz, publish v1
          mkfixture 1.0.0 src1.deb
          scripts/repack-to-xz.sh src1.deb staged/f1.deb
          ar t staged/f1.deb | grep -q 'data.tar.xz' || { echo "repack did not produce xz"; exit 1; }
          publish staged/f1.deb

          # 2) publish v2, then assert the manifest MERGED (both versions kept) —
          #    validates deb-s3 does not truncate the manifest on incremental runs.
          mkfixture 2.0.0 src2.deb
          scripts/repack-to-xz.sh src2.deb staged/f2.deb
          publish staged/f2.deb

          $AWS s3 cp s3://bes-ops-tools/apt/dists/stable/main/binary-amd64/Packages packages.txt
          grep -q 'Version: 1.0.0' packages.txt || { echo "v1 dropped: deb-s3 truncated the manifest"; exit 1; }
          grep -q 'Version: 2.0.0' packages.txt || { echo "v2 missing from manifest"; exit 1; }

          # 3) signed InRelease produced
          $AWS s3 cp s3://bes-ops-tools/apt/dists/stable/InRelease inrelease.txt
          grep -q 'BEGIN PGP SIGNED MESSAGE' inrelease.txt

          # 4) the snapshot S3->S3 copy form (validates the --copy-props none flag)
          $AWS s3 sync s3://bes-ops-tools/apt/ s3://bes-ops-tools/apt-backup-ci/ --no-progress --copy-props none

          # 5) a served pool deb is xz
          poolkey=$($AWS s3 ls s3://bes-ops-tools/apt/pool/ --recursive | awk '{print $4}' | grep '\.deb$' | head -1)
          $AWS s3 cp "s3://bes-ops-tools/$poolkey" served.deb
          ar t served.deb | grep -q 'data.tar.xz' || { echo "served deb is not xz"; exit 1; }
          echo "mock publish OK: repack=xz, manifest merged (v1+v2), signed, snapshot-copy valid"

  generate-repo:
    needs: helper-tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev binutils gnupg ruby ruby-dev build-essential zstd xz-utils
          sudo gem install deb-s3 -v 26.1.0
          deb-s3 --version

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-tamanu-tools-upload
          role-session-name: GHA@3PB=apt-repo

      - name: Snapshot and wipe (full rebuild only)
        if: ${{ inputs.rebuild }}
        run: |
          set -x
          runid="${{ github.run_id }}"
          # --copy-props none: this is an S3->S3 copy, and preserving object
          # props would call s3:GetObjectTagging, which the upload role lacks.
          aws s3 sync s3://bes-ops-tools/apt/ "s3://bes-ops-tools/apt-backup-$runid/" --no-progress --copy-props none
          aws s3 rm s3://bes-ops-tools/apt/ --recursive --no-progress
          aws s3 rm s3://bes-ops-tools/apt-state/ingested-keys.txt --no-progress || true

      - name: Publish new packages
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}
        run: |
          set -euo pipefail
          chmod +x scripts/repack-to-xz.sh scripts/select-new-debs.sh

          # Current ingested-keys marker. Distinguish "not present yet" (genuine
          # first run / post-rebuild -> start empty) from a transient download
          # error (must fail loudly, not silently reprocess the entire repo).
          if aws s3 ls s3://bes-ops-tools/apt-state/ingested-keys.txt >/dev/null 2>&1; then
            aws s3 cp s3://bes-ops-tools/apt-state/ingested-keys.txt ingested-keys.txt --no-progress
          else
            : > ingested-keys.txt
          fi

          gpg --export --armor "$GPG_KEY_ID" > bes-tools.gpg.key
          aws s3 cp bes-tools.gpg.key s3://bes-ops-tools/apt/bes-tools.gpg.key --no-progress

          publish_arch() {
            local arch="$1" target="$2"
            # Build the candidate source-key list using the same filters as before.
            : > candidates.txt
            for dir in aardvark-dns buildah crun krun libkrun libkrunfw netavark passt podman; do
              aws s3 ls "s3://bes-ops-tools/$dir/" --recursive \
                | awk '{print $4}' | grep -E "(^|/)$dir/.*-${target}-unknown-linux-gnu35-.*\.deb$" >> candidates.txt || true
            done
            for dir in caddy kopia bestool algae seedling; do
              aws s3 ls "s3://bes-ops-tools/$dir/" --recursive \
                | awk '{print $4}' | grep -E "(^|/)$dir/.*-${target}-.*\.deb$" >> candidates.txt || true
            done
            for dir in bestool-alertd bestool-psql; do
              aws s3 ls "s3://bes-ops-tools/$dir/" --recursive \
                | awk '{print $4}' | grep -E "(^|/)$dir/.*-${target}-.*\.deb$" | grep -v "/latest/" >> candidates.txt || true
            done

            local newkeys
            newkeys=$(scripts/select-new-debs.sh ingested-keys.txt < candidates.txt)
            if [ -z "$newkeys" ]; then
              echo "no new $arch packages"
              return 0
            fi

            mkdir -p "staged/$arch"
            local i=0
            while IFS= read -r key; do
              [ -n "$key" ] || continue
              aws s3 cp "s3://bes-ops-tools/$key" "src.deb" --no-progress
              scripts/repack-to-xz.sh src.deb "staged/$arch/$(printf '%04d' "$i")-$(basename "$key")"
              rm -f src.deb
              echo "$key" >> ingested-keys.txt
              i=$((i + 1))
            done <<< "$newkeys"

            deb-s3 upload \
              --bucket bes-ops-tools --prefix apt \
              --s3-region ap-southeast-2 \
              --codename stable --suite stable --component main --origin "BES Tools" \
              --arch "$arch" \
              --preserve-versions \
              --visibility nil \
              --sign="$GPG_KEY_ID" \
              --gpg-options="--pinentry-mode loopback --batch --yes --no-tty" \
              "staged/$arch/"*.deb

            # Checkpoint the marker after each arch publishes, so a failure in a
            # later arch does not force reprocessing an already-published one.
            aws s3 cp ingested-keys.txt s3://bes-ops-tools/apt-state/ingested-keys.txt --no-progress
          }

          publish_arch amd64 x86_64
          publish_arch arm64 aarch64

      - name: Clear CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id=EDAG0UBS1MN74 \
            --paths '/apt/*'

  test-repo:
    needs: generate-repo
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Wait for CloudFront cache to clear
        run: sleep 30

      - name: Add APT repository
        run: |
          curl -fsSL https://tools.ops.tamanu.io/apt/bes-tools.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/bes-tools.gpg
          echo "deb [signed-by=/etc/apt/keyrings/bes-tools.gpg] https://tools.ops.tamanu.io/apt stable main" | sudo tee /etc/apt/sources.list.d/bes-tools.list
          sudo tee /etc/apt/preferences.d/bes-tools <<EOF
          Package: *
          Pin: origin tools.ops.tamanu.io
          Pin-Priority: 999
          EOF
          sudo apt-get update

      - name: Install packages from repository
        run: |
          sudo apt-get install -y aardvark-dns buildah caddy crun kopia krun netavark passt podman bestool bestool-{psql,alertd} algae
          # seedling recommends jool-dkms (a DKMS kernel-module build) and btrfs-progs;
          # skip recommends here so the smoke test does not depend on the runner kernel
          # having headers for the DKMS build. Real installs pull the recommends.
          sudo apt-get install -y --no-install-recommends seedling

      - name: Verify installations
        run: |
          set -x
          /usr/local/libexec/podman/aardvark-dns --version
          buildah --version
          caddy version
          crun --version
          kopia --version
          krun --version
          /usr/local/libexec/podman/netavark --version
          passt --version
          pasta --version
          /usr/bin/podman --version
          /usr/local/bin/podman --version
          [ "$(readlink /usr/local/bin/podman)" = /usr/bin/podman ]
          bestool --version
          bestool-psql -h
          bestool-alertd -h
          algae --version
          seedling --version
          seedling-ctl --version
          seedling-web --version

      - name: Check systemd units (caddy)
        run: |
          systemctl cat caddy.service
          systemctl cat caddy.socket

      - name: Verify user/group created
        run: |
          id caddy
          groups caddy
          id kopia
          groups kopia
          getent passwd kopia | grep -q /var/lib/kopia
          [ "$(stat -c '%U:%G' /var/lib/kopia)" = kopia:kopia ]

  test-repo-26-04:
    needs: generate-repo
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Wait for CloudFront cache to clear
        run: sleep 30

      # GitHub Actions doesn't have ubuntu-26.04 runners yet; run the install
      # check in an ubuntu:26.04 container on the matching host arch. This
      # verifies our gnu35 debs install and run on the next LTS without
      # waiting for the hosted-runner image to land.
      - name: Install and verify on Ubuntu 26.04
        run: |
          docker run --rm -i \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:26.04 \
            bash -euxo pipefail <<'EOF'
          apt-get update
          apt-get install -y curl gpg ca-certificates
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://tools.ops.tamanu.io/apt/bes-tools.gpg.key \
            | gpg --dearmor -o /etc/apt/keyrings/bes-tools.gpg
          echo "deb [signed-by=/etc/apt/keyrings/bes-tools.gpg] https://tools.ops.tamanu.io/apt stable main" \
            > /etc/apt/sources.list.d/bes-tools.list
          cat > /etc/apt/preferences.d/bes-tools <<PIN
          Package: *
          Pin: origin tools.ops.tamanu.io
          Pin-Priority: 999
          PIN
          apt-get update
          apt-get install -y aardvark-dns buildah caddy crun kopia krun netavark passt podman \
            bestool bestool-psql bestool-alertd algae
          # seedling: skip recommends (jool-dkms/btrfs-progs) in this smoke test.
          apt-get install -y --no-install-recommends seedling
          /usr/local/libexec/podman/aardvark-dns --version
          buildah --version
          caddy version
          crun --version
          kopia --version
          krun --version
          /usr/local/libexec/podman/netavark --version
          passt --version
          pasta --version
          /usr/bin/podman --version
          /usr/local/bin/podman --version
          [ "$(readlink /usr/local/bin/podman)" = /usr/bin/podman ]
          bestool --version
          bestool-psql -h
          bestool-alertd -h
          algae --version
          seedling --version
          seedling-ctl --version
          seedling-web --version
          EOF

  test-repo-debian-12:
    needs: generate-repo
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Wait for CloudFront cache to clear
        run: sleep 30
      - name: Install and verify on Debian 12
        run: |
          docker run --rm -i -e DEBIAN_FRONTEND=noninteractive debian:12 \
            bash -euxo pipefail <<'EOF'
          apt-get update
          apt-get install -y curl gpg ca-certificates
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://tools.ops.tamanu.io/apt/bes-tools.gpg.key \
            | gpg --dearmor -o /etc/apt/keyrings/bes-tools.gpg
          echo "deb [signed-by=/etc/apt/keyrings/bes-tools.gpg] https://tools.ops.tamanu.io/apt stable main" \
            > /etc/apt/sources.list.d/bes-tools.list
          cat > /etc/apt/preferences.d/bes-tools <<PIN
          Package: *
          Pin: origin tools.ops.tamanu.io
          Pin-Priority: 999
          PIN
          apt-get update
          apt-get install -y aardvark-dns buildah caddy crun kopia krun netavark passt podman \
            bestool bestool-psql bestool-alertd algae
          apt-get install -y --no-install-recommends seedling
          bestool --version; bestool-psql -h; bestool-alertd -h
          algae --version; seedling --version; caddy version; kopia --version
          EOF

  test-repo-debian-11:
    needs: generate-repo
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Wait for CloudFront cache to clear
        run: sleep 30
      - name: Install and verify first-party subset on Debian 11
        run: |
          docker run --rm -i -e DEBIAN_FRONTEND=noninteractive debian:11 \
            bash -euxo pipefail <<'EOF'
          apt-get update
          apt-get install -y curl gpg ca-certificates
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://tools.ops.tamanu.io/apt/bes-tools.gpg.key \
            | gpg --dearmor -o /etc/apt/keyrings/bes-tools.gpg
          echo "deb [signed-by=/etc/apt/keyrings/bes-tools.gpg] https://tools.ops.tamanu.io/apt stable main" \
            > /etc/apt/sources.list.d/bes-tools.list
          cat > /etc/apt/preferences.d/bes-tools <<PIN
          Package: *
          Pin: origin tools.ops.tamanu.io
          Pin-Priority: 999
          PIN
          apt-get update
          # glibc 2.31 on bullseye: only the first-party subset is expected to work.
          apt-get install -y bestool bestool-psql bestool-alertd algae
          apt-get install -y --no-install-recommends seedling
          bestool --version; bestool-psql -h; bestool-alertd -h
          algae --version; seedling --version
          EOF
