name: passt

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/passt.yml

permissions:
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  # Upstream tag format: YYYY_MM_DD.{short_hash}. We restate this as
  # 0.0~gitYYYYMMDD.{short_hash}-bes1 in the deb so version comparisons line
  # up with Ubuntu's own passt package, which uses the same scheme (e.g.
  # 0.0~git20260120.386b5f5-1 on 26.04). The -bes1 revision suffix ensures
  # our build of a given upstream snapshot sorts above Ubuntu's -N.
  PASST_VERSION: 2026_05_07.1afd4ed

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: x86_64-unknown-linux-gnu
            debarch: amd64
            glibc: 2.38
          - os: ubuntu-22.04
            name: x86_64-unknown-linux-gnu35
            debarch: amd64
            glibc: 2.35
          - os: ubuntu-24.04-arm
            name: aarch64-unknown-linux-gnu
            debarch: arm64
            glibc: 2.38
          - os: ubuntu-22.04-arm
            name: aarch64-unknown-linux-gnu35
            debarch: arm64
            glibc: 2.35

    runs-on: ${{ matrix.os }}
    steps:
      - name: Compute deb version
        id: ver
        run: |
          date="${PASST_VERSION%.*}"   # YYYY_MM_DD
          hash="${PASST_VERSION##*.}"  # short hash
          echo "deb=0.0~git${date//_/}.${hash}-bes1" >> "$GITHUB_OUTPUT"

      - name: Fetch passt source
        run: |
          curl -fsSL "https://passt.top/passt/snapshot/passt-${PASST_VERSION}.tar.gz" -o passt.tar.gz
          tar -xf passt.tar.gz
          mv "passt-${PASST_VERSION}" src

      - run: sudo apt-get update
      - run: sudo apt-get install -y build-essential

      - run: make -C src
      - run: mkdir passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}
      - run: make -C src DESTDIR=$(pwd)/passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }} prefix=/usr install
      - run: tar -caf passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}.tar.zst passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}

      - name: Make deb
        run: |
          mkdir -p passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}/DEBIAN
          cat <<EOF > passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}/DEBIAN/control
          Package: passt
          Version: ${{ steps.ver.outputs.deb }}
          Architecture: ${{ matrix.debarch }}
          Priority: optional
          Section: universe/net
          Maintainer: BES <support@bes.au>
          Bugs: https://passt.top/passt/about
          Provides: pasta
          Depends: libc6 (>= ${{ matrix.glibc }})
          Enhances: podman
          Homepage: https://passt.top
          Description: User-mode networking for namespaces, sockets, containers
           passt (Plug A Simple Socket Transport) provides full Layer-2
           networking to user-mode unprivileged containers via the host's
           network protocol stack. pasta connects a network namespace to the
           host's network via TAP devices and is the default rootless backend
           for podman 5.
          EOF
          dpkg-deb --root-owner-group -b passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}

      - uses: actions/attest-build-provenance@v1
        with:
          subject-path: passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}.*
      - uses: actions/upload-artifact@v4
        with:
          name: passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}
          path: passt-${{ matrix.name }}-${{ steps.ver.outputs.deb }}.*
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: passt-*
          merge-multiple: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-tamanu-tools-upload
          role-session-name: GHA@3PB=passt

      - name: Upload
        run: |
          date="${PASST_VERSION%.*}"
          hash="${PASST_VERSION##*.}"
          deb_ver="0.0~git${date//_/}.${hash}-bes1"
          for f in passt-*; do
            aws s3 cp "$f" "s3://bes-ops-tools/passt/${deb_ver}/$f" --no-progress
          done

      - name: Clear cache
        run: aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/passt/*'
