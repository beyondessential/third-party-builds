name: skopeo

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/skopeo.yml

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  id-token: write
  attestations: write

env:
  GO_VERSION: 1.26.3
  SKOPEO_VERSION: 1.23.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            debarch: amd64
            glibc: 2.38
          - os: ubuntu-22.04
            name: x86_64-unknown-linux-gnu35
            goos: linux
            goarch: amd64
            debarch: amd64
            glibc: 2.35
          - os: ubuntu-24.04-arm
            name: aarch64-unknown-linux-gnu
            goos: linux
            goarch: arm64
            debarch: arm64
            glibc: 2.38
          - os: ubuntu-22.04-arm
            name: aarch64-unknown-linux-gnu35
            goos: linux
            goarch: arm64
            debarch: arm64
            glibc: 2.35

    runs-on: ${{ matrix.os }}
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Checkout skopeo source
        uses: actions/checkout@v4
        with:
          repository: containers/skopeo
          ref: v${{ env.SKOPEO_VERSION }}

      - name: Install skopeo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            btrfs-progs \
            build-essential \
            git \
            go-md2man \
            libbtrfs-dev \
            libc6-dev \
            libdevmapper-dev \
            pkg-config

      # containers_image_openpgp swaps the libgpgme link for a pure-Go OpenPGP
      # implementation, so the binary doesn't depend on libgpgme.so.11 (which
      # Ubuntu 26.04 dropped in favour of libgpgme.so.45).
      - run: make bin/skopeo BUILDTAGS="containers_image_openpgp exclude_graphdriver_devicemapper" PREFIX=/usr
      - run: mkdir skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}
      # install the binary, man pages and shell completions only. policy.json
      # and registries.d/default.yaml are owned by containers-common (which we
      # depend on) — shipping them here too would create dpkg file conflicts.
      - run: |
          make DESTDIR=$(pwd)/skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }} PREFIX=/usr \
            install-binary install-docs install-completions
      - run: tar -caf skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}.tar.zst skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}

      - name: Make deb
        run: |
          mkdir -p skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}/DEBIAN
          cat <<EOF > skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}/DEBIAN/control
          Package: skopeo
          Version: ${{ env.SKOPEO_VERSION }}-bes1
          Architecture: ${{ matrix.debarch }}
          Priority: optional
          Section: universe/admin
          Maintainer: BES <support@bes.au>
          Bugs: https://github.com/containers/skopeo/issues
          Depends: containers-common (>= 0.68), libc6 (>= ${{ matrix.glibc }})
          Breaks: podman (<< 6.0.0)
          Enhances: podman, buildah
          Homepage: https://github.com/containers/skopeo
          Description: Command line utility to interact with container images and registries
           Skopeo works with remote container registries and local OCI/Docker
           image stores to inspect, copy, sign and delete images without
           requiring a daemon.
          EOF
          dpkg-deb --root-owner-group -b skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}

      - uses: actions/attest-build-provenance@v1
        with:
          subject-path: skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}.*
      - uses: actions/upload-artifact@v4
        with:
          name: skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}
          path: skopeo-${{ matrix.name }}-${{ env.SKOPEO_VERSION }}.*
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write # OIDC token for AWS login
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: skopeo-*
          merge-multiple: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::143295493206:role/gha-tamanu-tools-upload
          role-session-name: GHA@3PB=skopeo

      - name: Upload
        run: |
          for f in skopeo-*; do
            aws s3 cp $f s3://bes-ops-tools/skopeo/${{ env.SKOPEO_VERSION }}/$f --no-progress
          done

      - name: Clear cache
        run: aws cloudfront create-invalidation --distribution-id=EDAG0UBS1MN74 --paths '/skopeo/*'
